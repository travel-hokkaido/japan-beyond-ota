<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan Beyond OTA</title>
<script src="https://artifactcdn.diabrowser.engineering/ajax/libs/Chart.js/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAF8F5;--card:#FFFFFF;
  --accent:#C45D3E;--accent-hover:#E8735A;--accent-bg:rgba(196,93,62,0.08);
  --text:#2D2A26;--text2:#7A7570;
  --border:#E8E4DF;--border-light:#F0ECE8;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,0.04);
  --st-confirmed:#3A8A5C;--st-pending:#D4973B;--st-cancelled:#C44D3E;--st-completed:#4A7FB5;
}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* === HEADER === */
.header{background:var(--card);height:60px;border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100}
.header-logo{font-size:20px;font-weight:700;color:var(--accent);white-space:nowrap}
.header-logo span{font-weight:400;color:var(--text);font-size:20px;margin-left:1px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.lang-select{padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);font-size:13px;cursor:pointer;color:var(--text);transition:border-color .2s}
.lang-select:focus{outline:none;border-color:var(--accent)}

/* === BUTTONS === */
.btn{padding:10px 20px;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:all .2s;line-height:1}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{background:var(--accent-hover)}
.btn-outline{background:var(--bg);border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-danger{background:#FEF2F2;color:var(--st-cancelled);border:1px solid #FECACA}
.btn-danger:hover{background:#FEE2E2;color:#991B1B}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.sync-dot.connected{background:var(--st-confirmed)}
.sync-dot.disconnected{background:#ccc}

/* === TABS === */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 24px;background:var(--card)}
.tab{padding:14px 24px;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* === MAIN === */
.main{padding:24px;max-width:1200px;margin:0 auto;padding-bottom:72px}

/* === SUMMARY CARDS === */
.summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.summary-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border-light);padding:20px;text-align:center}
.summary-card .value{font-size:28px;font-weight:700;color:var(--accent)}
.summary-card .label{font-size:12px;color:var(--text2);margin-top:6px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.summary-card .sub{font-size:11px;color:var(--text2);margin-top:2px}

/* === OTA GRID === */
.ota-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.ota-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border-light);padding:0;cursor:pointer;position:relative;transition:transform .2s,box-shadow .2s;overflow:hidden}
.ota-card .ota-color-bar{height:4px;width:100%}
.ota-card .ota-card-body{padding:20px}
.ota-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.ota-card .hover-btns{position:absolute;top:12px;right:12px;display:flex;gap:4px;opacity:0;transition:opacity .2s}
.ota-card:hover .hover-btns{opacity:1}
.ota-card h3{font-size:18px;font-weight:700;margin-bottom:4px}
.ota-card .ota-meta{font-size:13px;color:var(--text2);margin-bottom:14px}
.ota-card .ota-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ota-card .ota-stat{text-align:center;padding:10px 8px;background:var(--bg);border-radius:var(--radius-sm)}
.ota-card .ota-stat .num{font-size:22px;font-weight:700;color:var(--accent)}
.ota-card .ota-stat .lbl{font-size:11px;color:var(--text2);margin-top:2px}
.ota-card-add{background:var(--card);border-radius:var(--radius);border:2px dashed var(--border);padding:20px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:180px;transition:all .2s}
.ota-card-add:hover{border-color:var(--accent);background:var(--accent-bg)}
.ota-card-add .plus{font-size:36px;color:var(--accent);margin-bottom:8px;line-height:1}
.ota-card-add .label{font-size:14px;color:var(--text2);font-weight:600}

/* === ALERT === */
.alert-banner{background:#FFF3CD;border:1px solid #FFE082;border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:16px;font-size:13px;color:#856404;display:flex;align-items:center;gap:8px}
.alert-banner .alert-icon{width:20px;height:20px;border-radius:50%;background:#D4973B;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* === TOOLBAR === */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-input{padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;min-width:220px;background:var(--card);transition:border-color .2s,box-shadow .2s}
.search-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(196,93,62,0.1)}

/* === FILTER CHIPS === */
.filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);transition:all .2s}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* === VIEW TOGGLE === */
.view-toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.view-toggle .vt-btn{padding:8px 16px;font-size:12px;border:none;background:var(--card);cursor:pointer;font-weight:600;color:var(--text2);transition:all .2s}
.view-toggle .vt-btn:hover{color:var(--text)}
.view-toggle .vt-btn.active{background:var(--accent);color:#fff}

/* === TABLE === */
.table-wrap{background:var(--card);border-radius:var(--radius);border:1px solid var(--border-light);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{background:var(--bg);padding:10px 12px;text-align:left;font-weight:700;color:var(--text2);white-space:nowrap;border-bottom:1px solid var(--border);font-size:12px;text-transform:uppercase;letter-spacing:.3px;overflow:hidden;text-overflow:ellipsis}
td{padding:10px 12px;border-bottom:1px solid var(--border-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
td.nowrap-cell{overflow:visible;text-overflow:clip}
tr.clickable{cursor:pointer;transition:background .15s}
tr.clickable:hover{background:var(--accent-bg)}
tr.past-res{opacity:.45}
tr.cancelled-res td{background:#FEF2F2;color:#991B1B}
tr.sent-res td{background:#ECFDF5}
tr.sent-res.cancelled-res td{background:#FEF2F2;color:#991B1B}
.sent-btn{border:1px solid var(--border);background:var(--card);border-radius:6px;padding:4px 8px;font-size:11px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s}
.sent-btn:hover{border-color:var(--st-confirmed)}
.sent-btn.done{background:var(--st-confirmed);color:#fff;border-color:var(--st-confirmed)}
.copy-btn{border:none;background:none;cursor:pointer;color:var(--text2);padding:2px 4px;font-size:11px;border-radius:4px;opacity:.5;transition:all .15s;vertical-align:middle}
.copy-btn:hover{opacity:1;background:var(--accent-bg);color:var(--accent)}
.cell-copy{display:inline-flex;align-items:center;gap:2px;max-width:100%}
.cell-copy .cell-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* === STATUS BADGES === */
.status-badge{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;display:inline-block}
.status-badge.st-confirmed{background:#ECFDF5;color:#065F46}
.status-badge.st-pending{background:#FFFBEB;color:#92400E}
.status-badge.st-cancelled{background:#FEF2F2;color:#991B1B}
.status-badge.st-completed{background:#EFF6FF;color:#1E40AF}
.badge-repeater{padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;background:var(--accent-bg);color:var(--accent);margin-left:6px}

/* === CALENDAR === */
.calendar{background:var(--card);border-radius:var(--radius);border:1px solid var(--border-light);padding:20px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav .month-label{font-size:18px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border)}
.cal-header{background:var(--bg);padding:8px;text-align:center;font-size:12px;font-weight:700;color:var(--text2)}
.cal-cell{background:var(--card);min-height:80px;padding:4px;vertical-align:top;position:relative}
.cal-cell.empty{background:#f8f6f3}
.cal-cell.today{background:#FFF8F0}
.cal-day{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:2px}
.cal-event{font-size:10px;padding:2px 5px;border-radius:4px;color:#fff;margin-bottom:2px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:opacity .2s}
.cal-event:hover{opacity:.8}

/* === MODAL === */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;justify-content:center;align-items:flex-start;padding:40px 16px;overflow-y:auto}
.modal-box{background:var(--card);border-radius:16px;width:100%;max-width:720px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.18);margin:auto}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:1;border-radius:16px 16px 0 0}
.modal-header h2{font-size:18px;font-weight:700}
.modal-close{background:var(--bg);border:1px solid var(--border-light);width:32px;height:32px;border-radius:8px;font-size:18px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .2s;padding:0;line-height:1}
.modal-close:hover{background:var(--border-light);color:var(--text)}
.modal-body{padding:24px}

/* === FORM === */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--card);color:var(--text);transition:border-color .2s,box-shadow .2s;font-family:inherit}
.form-group textarea{min-height:60px;resize:vertical}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(196,93,62,0.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:24px;flex-wrap:wrap}
.pw-toggle{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--accent);cursor:pointer;margin-left:8px;font-weight:600}
.pw-toggle:hover{color:var(--accent-hover)}

/* === PRODUCT ITEMS === */
.product-item{background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light);padding:14px;margin-bottom:8px;position:relative;transition:border-color .2s}
.product-item:hover{border-color:var(--border)}
.product-item h4{font-size:14px;font-weight:600;margin-bottom:4px}
.product-item .product-url{font-size:11px;color:var(--accent);text-decoration:none;word-break:break-all}
.product-item .product-url:hover{text-decoration:underline}
.product-item .product-status{font-size:11px;padding:2px 8px;border-radius:99px;display:inline-block;margin-top:4px;font-weight:600}
.product-item .product-actions{position:absolute;top:10px;right:10px;display:flex;gap:4px}
.option-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;padding:10px 12px;background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius-sm);transition:border-color .2s}
.option-row:hover{border-color:var(--border)}
.option-row input{flex:1;border:none;background:transparent;font-size:13px;color:var(--text);padding:0;font-family:inherit}
.option-row input:focus{outline:none}
.option-row .opt-divider{width:1px;height:20px;background:var(--border-light);flex-shrink:0}
.option-row .price-input{max-width:100px;text-align:right}
.option-row .price-label{font-size:12px;color:var(--text2);flex-shrink:0}
.option-row .opt-remove{background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px;padding:2px 4px;border-radius:4px;transition:all .15s;flex-shrink:0;line-height:1}
.option-row .opt-remove:hover{color:var(--st-cancelled);background:#FEF2F2}
.options-section{background:var(--bg);border-radius:var(--radius);border:1px solid var(--border-light);padding:16px;margin-bottom:20px}
.options-section .section-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.product-form-top{display:grid;grid-template-columns:1fr 140px;gap:12px;margin-bottom:4px}

/* === ACCOUNT INFO === */
.account-info{background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border-light);padding:16px;margin-bottom:20px}
.account-info .info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:13px}
.account-info .info-row:last-child{border-bottom:none}
.account-info .info-label{color:var(--text2);font-weight:600}
.account-info .info-value{text-align:right;word-break:break-all}

/* === STATS / CHARTS === */
.stats-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-top:24px}
.chart-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border-light);padding:20px}
.chart-card h3{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--text2)}
.chart-wrap{position:relative;width:100%;height:clamp(200px,30vh,320px);min-width:0}
.chart-wrap.doughnut{height:clamp(200px,28vh,300px)}

/* === COLOR PICKER === */
.color-picker-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s}
.color-opt:hover,.color-opt.selected{border-color:var(--text);transform:scale(1.1)}

/* === ANIMATION === */
.fade-in{animation:fadeIn .3s ease}

/* === CUSTOM POPUP === */
.popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:300;justify-content:center;align-items:center}
.popup-box{background:var(--card);border-radius:16px;padding:28px;max-width:380px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.18);text-align:center;animation:fadeIn .2s ease}
.popup-msg{font-size:15px;line-height:1.5;margin-bottom:24px;color:var(--text);word-break:break-word}
.popup-btns{display:flex;gap:8px;justify-content:center}
.popup-btns .btn{min-width:100px;justify-content:center}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* === MOBILE === */
@media(max-width:768px){
  .header{padding:0 16px;height:56px}
  .header-logo{font-size:17px}
  .header-logo span{font-size:17px}
  .main{padding:16px}
  .tabs{padding:0 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tab{padding:12px 16px;font-size:13px}
  .summary-cards{grid-template-columns:repeat(2,1fr);gap:10px}
  .ota-grid{grid-template-columns:1fr}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .toolbar{flex-direction:column;align-items:stretch}
  .search-input{min-width:auto;width:100%}
  .cal-cell{min-height:50px}
  .stats-grid{grid-template-columns:1fr}
  .modal-box{border-radius:12px;max-width:100%}
  .modal-header{border-radius:12px 12px 0 0}
}

/* === PRINT === */
@media print{
  .header,.tabs,.toolbar,.alert-banner,.btn,.filter-chips,.view-toggle,.no-print{display:none!important}
  .main{padding:10px;max-width:100%}
  .modal-overlay{display:none!important}
  .table-wrap{box-shadow:none;border:1px solid #ddd}
  .chart-card{break-inside:avoid;box-shadow:none;border:1px solid #ddd}
}
</style>
</head>
<body>
<div id="app">
  <div id="headerArea"></div>
  <div id="tabsArea"></div>
  <div id="mainArea" class="main"></div>
</div>
<div id="modalOverlay" class="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal-box" id="modalBox" onclick="event.stopPropagation()">
    <div id="modalBody"></div>
  </div>
</div>
<div id="popupOverlay" class="popup-overlay">
  <div class="popup-box">
    <div class="popup-msg" id="popupMsg"></div>
    <div class="popup-btns" id="popupBtns"></div>
  </div>
</div>

function genId() { return 'id' + Date.now() + Math.random().toString(36).substr(2,6); }
function pad(n) { return n < 10 ? '0' + n : '' + n; }
function fmtDate(d) { return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()); }
function fmtYen(n) { return '¥' + Number(n||0).toLocaleString(); }

function getRepeaters() {
  var res = data.reservations || [];
  var counts = {};
  res.forEach(function(r){ var n=(r.guest||'').trim().toLowerCase(); if(n) counts[n]=(counts[n]||0)+1; });
  var rep = {};
  for(var n in counts){ if(counts[n]>=2) rep[n]=true; }
  return rep;
}

function getDriverName(driver) {
  return driver || '';
}

function normOpt(s) {
  return (s||'').toLowerCase().replace(/\s+/g,'').replace(/[（）]/g,function(m){return m==='（'?'(':')';}).replace(/[~〜～]/g,'~');
}

function matchProductPrice(otaId, tourName, vehicle) {
  if(!tourName) return null;
  var otas = data.otas || [];
  var searchOtas = otaId ? otas.filter(function(o){return o.id===otaId;}) : otas;
  var tn = tourName.trim().toLowerCase();
  var vn = normOpt(vehicle);
  for(var i=0;i<searchOtas.length;i++){
    var prods = searchOtas[i].products || [];
    for(var j=0;j<prods.length;j++){
      var p = prods[j];
      var pn = (p.name||'').trim().toLowerCase();
      var tourMatch = (tn === pn) || (tn.length>3 && pn.length>3 && (tn.indexOf(pn)>=0 || pn.indexOf(tn)>=0));
      if(tourMatch) {
        var comm = p.commission !== undefined ? p.commission : searchOtas[i].commission;
        var opts = p.options || [];
        for(var k=0;k<opts.length;k++){
          var on = normOpt(opts[k].name);
          if(vn && (on === vn || on.indexOf(vn)>=0 || vn.indexOf(on)>=0)) {
            var gross = opts[k].price;
            var net = Math.round(gross * (100 - comm) / 100);
            return {gross:gross, commission:comm, net:net, productName:p.name, optionName:opts[k].name};
          }
        }
      }
    }
  }
  return null;
}

function fuzzyMatch(a, b) {
  var wordsA = a.replace(/[^a-z0-9 ]/g,'').split(' ').filter(function(w){return w.length>2;});
  var wordsB = b.replace(/[^a-z0-9 ]/g,'').split(' ').filter(function(w){return w.length>2;});
  if(wordsA.length===0) return false;
  var matched = 0;
  wordsA.forEach(function(wa){
    wordsB.forEach(function(wb){
      if(wa===wb || wb.indexOf(wa)>=0 || wa.indexOf(wb)>=0) matched++;
    });
  });
  return matched >= Math.min(2, wordsA.length);
}

function getDriverConflict(driverName, date, excludeResId) {
  if(!driverName || !date) return false;
  var dn = driverName.trim().toLowerCase();
  var res = data.reservations || [];
  for(var i=0;i<res.length;i++){
    var r = res[i];
    if((r.driver||'').trim().toLowerCase() === dn && r.date === date && r.id !== excludeResId && r.status !== 'cancelled') return r;
  }
  return false;
}

function saveDriver(e, driverId) {
  e.preventDefault();
  if(!data.drivers) data.drivers = [];
  var obj = {
    name: document.getElementById('df-name').value.trim(),
    phone: document.getElementById('df-phone').value.trim(),
    vehicles: document.getElementById('df-vehicles').value.trim()
  };
  if(driverId) {
    for(var i=0;i<data.drivers.length;i++){
      if(data.drivers[i].id===driverId){ obj.id=driverId; data.drivers[i]=obj; break; }
    }
  } else {
    obj.id = genId();
    data.drivers.push(obj);
  }
  saveData();
  showDriverManager();
}

function deleteDriver(driverId) {
  showConfirm(t('confirmDel'), function(){
    data.drivers = (data.drivers||[]).filter(function(d){return d.id!==driverId;});
    saveData();
    showDriverManager();
  });
}

  window._popupYes = null;

}

  h += '<span class="opt-divider"></span>';

  h += '<input class="opt-price price-input" type="number" value="' + (price||0) + '" placeholder="0" oninput="updateOptionPreview()">';

function addOptionRow() {
  var c = document.getElementById('optionsContainer');
  var div = document.createElement('div');
  div.innerHTML = optionRowHtml(optionCounter, '', 0);
  c.appendChild(div.firstChild);
}

function removeOptionRow(rid) {
  var el = document.getElementById(rid);
  if(el) el.remove();
  updateOptionPreview();
}

function setPriceMode(mode) {
  document.getElementById('pf-priceMode').value = mode;
  document.getElementById('pm-gross').className = 'vt-btn' + (mode==='gross'?' active':'');
  document.getElementById('pm-net').className = 'vt-btn' + (mode==='net'?' active':'');
  updateOptionPreview();
}

function updateOptionPreview() {
  var preview = document.getElementById('optionPreview');
  if(!preview) return;
  var commEl = document.getElementById('pf-commission');
  var modeEl = document.getElementById('pf-priceMode');
  if(!commEl || !modeEl) return;
  var comm = parseInt(commEl.value) || 0;
  var mode = modeEl.value;
  var rows = document.getElementById('optionsContainer').querySelectorAll('.option-row');
  var html = '';
  for(var i=0;i<rows.length;i++){
    var name = rows[i].querySelector('.opt-name').value.trim();
    var val = parseInt(rows[i].querySelector('.opt-price').value) || 0;
    if(!name || !val) continue;
    if(mode === 'gross') {
      var net = Math.round(val * (100 - comm) / 100);
      html += '<div style="margin-bottom:2px">' + escHtml(name) + ': ' + t('grossPrice') + ' ' + fmtYen(val) + ' → ' + t('netPrice') + ' <strong style="color:var(--accent)">' + fmtYen(net) + '</strong></div>';
    } else {
      var gross = Math.round(val * 100 / (100 - comm));
      html += '<div style="margin-bottom:2px">' + escHtml(name) + ': ' + t('netPrice') + ' ' + fmtYen(val) + ' ← ' + t('grossPrice') + ' <strong>' + fmtYen(gross) + '</strong></div>';
    }
  }
  preview.innerHTML = html;
}

function saveProduct(e, otaId, productId) {
  e.preventDefault();
  var o = getOta(otaId);
  if(!o) return;
  if(!o.products) o.products = [];
  var name = document.getElementById('pf-name').value.trim();
  var url = document.getElementById('pf-url').value.trim();
  var status = document.getElementById('pf-status').value;
  var commission = parseInt(document.getElementById('pf-commission').value) || 0;
  var priceMode = document.getElementById('pf-priceMode').value;
  var optRows = document.getElementById('optionsContainer').querySelectorAll('.option-row');
  var options = [];
  for(var i=0;i<optRows.length;i++){
    var on = optRows[i].querySelector('.opt-name').value.trim();
    var op = parseInt(optRows[i].querySelector('.opt-price').value) || 0;
    if(on) {
      var grossPrice = (priceMode === 'net') ? Math.round(op * 100 / (100 - commission)) : op;
      options.push({name:on, price:grossPrice});
    }
  }
  if(productId) {
    for(var i=0;i<o.products.length;i++){
      if(o.products[i].id===productId){
        o.products[i].name=name;
        o.products[i].url=url;
        o.products[i].status=status;
        o.products[i].commission=commission;
        o.products[i].options=options;
        break;
      }
    }
  } else {
    o.products.push({id:genId(), name:name, url:url, status:status, commission:commission, options:options});
  }
  saveData();
  sbUpsertOta(o);
  showOtaDetail(otaId);
}

function deleteProduct(otaId, productId) {
  showConfirm(t('confirmDel'), function(){
    var o = getOta(otaId);
    if(!o) return;
    o.products = (o.products||[]).filter(function(p){return p.id!==productId;});
    saveData();
    sbUpsertOta(o);
    showOtaDetail(otaId);
  });
}

function copyProduct(otaId, productId) {
  var o = getOta(otaId);
  if(!o) return;
  var prods = o.products || [];
  var src = null;
  for(var i=0;i<prods.length;i++){ if(prods[i].id===productId){src=prods[i];break;} }
  if(!src) return;
  var copy = {
    id: genId(),
    name: src.name + ' (Copy)',
    url: src.url || '',
    status: src.status || 'published',
    commission: src.commission,
    options: (src.options||[]).map(function(op){ return {name:op.name, price:op.price}; })
  };
  o.products.push(copy);
  saveData();
  sbUpsertOta(o);
  showOtaDetail(otaId);
}

function saveOta(e, otaId) {
  e.preventDefault();
  var name = document.getElementById('of-name').value.trim();
  var comm = parseInt(document.getElementById('of-comm').value)||0;
  var market = document.getElementById('of-market').value.trim();
  var url = document.getElementById('of-url').value.trim();
  var lid = document.getElementById('of-lid').value.trim();
  var pw = document.getElementById('of-pw').value;
  var em = document.getElementById('of-email').value.trim();
  var color = document.getElementById('of-color').value;
  if(otaId) {
    var o = getOta(otaId);
    if(o){
      o.name=name; o.commission=comm; o.market=market; o.url=url;
      o.loginId=lid; o.password=pw; o.emailDomain=em; o.color=color;
      sbUpsertOta(o);
    }
  } else {
    var newId = name.toLowerCase().replace(/[^a-z0-9]/g,'') + Date.now().toString(36);
    var newOta = {
      id:newId, name:name, commission:comm, market:market, url:url,
      loginId:lid, password:pw, emailDomain:em, color:color, products:[]
    };
    data.otas.push(newOta);
    sbUpsertOta(newOta);
  }
  saveData();
  closeModal();
  renderOtaTab();
}

function setFilter(id) { filterOtaId=id; renderResTab(); }
function setResView(v) { resView=v; renderResTab(); }
function togglePastRes() { showPastRes=!showPastRes; renderResTab(); }
function toggleCancelled() { showCancelled=!showCancelled; renderResTab(); }

function getFilteredRes() {
  var res = data.reservations || [];
  if(!showPastRes) {
    var td = todayStr();
    res = res.filter(function(r){ return (r.date||'') >= td; });
  }
  if(!showCancelled) {
    res = res.filter(function(r){ return r.status !== 'cancelled'; });
  }
  if(filterOtaId) res = res.filter(function(r){return r.otaId===filterOtaId;});
  if(searchQ) {
    var q = searchQ.toLowerCase();
    res = res.filter(function(r){
      return (r.guest||'').toLowerCase().indexOf(q)>=0 ||
             (r.bookingNo||'').toLowerCase().indexOf(q)>=0 ||
             (r.tour||'').toLowerCase().indexOf(q)>=0;
    });
  }
  res.sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});
  return res;
}

function copyBtn(text) {
  var safe = (text||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  return '<button class="copy-btn" title="Copy" onclick="event.stopPropagation();copyText(\'' + safe + '\',this)">⧉</button>';
}

function copyText(text, btn) {
  function done() {
    if(btn){ var old = btn.textContent; btn.textContent='✓'; setTimeout(function(){ btn.textContent=old; }, 1000); }
  }
  if(navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(function(){ fallbackCopy(text); done(); });
  } else {
    fallbackCopy(text); done();
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}

function toggleDriverSent(resId) {
  var res = data.reservations || [];
  for(var i=0;i<res.length;i++){
    if(res[i].id===resId){
      res[i].driverSent = !res[i].driverSent;
      saveData();
      sbUpsertReservation(res[i]);
      break;
    }
  }
  renderMain();
}

/* ===== CALENDAR VIEW ===== */
function renderCalendar() {
  var year = calYear;
  var month = calMonth;
  var firstDay = new Date(year, month, 1).getDay();
  var daysInMonth = new Date(year, month+1, 0).getDate();
  var todayS = todayStr();
  var reservations = data.reservations || [];
  if(!showCancelled) {
    reservations = reservations.filter(function(r){ return r.status !== 'cancelled'; });
  }
  var monthRes = reservations.filter(function(r){
    if(!r.date) return false;
    var parts = r.date.split('-');
    return parseInt(parts[0])===year && parseInt(parts[1])===(month+1);
  });

  var monthNames = {
    ja:['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
    ko:['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'],
    en:['January','February','March','April','May','June','July','August','September','October','November','December']
  };
  var mLabel = (monthNames[currentLang]||monthNames.en)[month];

  var h = '<div class="calendar">';
  h += '<div class="cal-nav">';
  h += '<button class="btn btn-outline btn-sm" onclick="calPrev()">' + t('prevMonth') + '</button>';
  h += '<span class="month-label">' + year + ' ' + mLabel + '</span>';
  h += '<button class="btn btn-outline btn-sm" onclick="calNext()">' + t('nextMonth') + '</button>';
  h += '</div>';
  h += '<div class="cal-grid">';
  var dayNames = [t('sun'),t('mon'),t('tue'),t('wed'),t('thu'),t('fri'),t('sat')];
  dayNames.forEach(function(d){ h += '<div class="cal-header">' + d + '</div>'; });
  for(var i=0;i<firstDay;i++) h += '<div class="cal-cell empty"></div>';
  for(var d=1;d<=daysInMonth;d++){
    var ds = year + '-' + pad(month+1) + '-' + pad(d);
    var isToday = ds===todayS;
    var dayRes = monthRes.filter(function(r){return r.date===ds;});
    h += '<div class="cal-cell' + (isToday?' today':'') + '">';
    h += '<span class="cal-day">' + d + '</span>';
    dayRes.forEach(function(r){
      h += '<div class="cal-event" style="background:' + getOtaColor(r.otaId) + '" onclick="event.stopPropagation();showResForm(\'' + r.id + '\')">';
      var calLabel = escHtml(r.guest);
      var calDriver = r.driver || '';
      if(calDriver) calLabel += ' [' + escHtml(calDriver) + ']';
      h += calLabel;
      h += '</div>';
    });
    h += '</div>';
  }
  var totalCells = firstDay + daysInMonth;
  var remainder = totalCells % 7;
  if(remainder > 0) { for(var i=0;i<7-remainder;i++) h += '<div class="cal-cell empty"></div>'; }
  h += '</div>';
  var otas = data.otas || [];
  if(otas.length > 0) {
    h += '<div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;padding:0 4px">';
    otas.forEach(function(o){
      h += '<div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)">';
      h += '<span style="width:10px;height:10px;border-radius:3px;background:' + o.color + ';display:inline-block"></span>';
      h += escHtml(o.name);
      h += '</div>';
    });
    h += '</div>';
  }
  h += '</div>';
  return h;
}

function calPrev() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderResTab(); }
function calNext() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderResTab(); }

function saveRes(e, resId) {
  e.preventDefault();
  var obj = {
    otaId: document.getElementById('rf-ota').value,
    bookingNo: document.getElementById('rf-bno').value.trim(),
    guest: document.getElementById('rf-guest').value.trim(),
    tour: document.getElementById('rf-tour').value.trim(),
    date: document.getElementById('rf-date').value,
    pickupTime: document.getElementById('rf-pickupTime').value,
    vehicle: document.getElementById('rf-vehicle').value.trim(),
    price: parseInt(document.getElementById('rf-price').value)||0,
    pax: parseInt(document.getElementById('rf-pax').value)||0,
    carSeat: parseInt(document.getElementById('rf-carseat').value)||0,
    pickup: document.getElementById('rf-pickup').value.trim(),
    dropoff: document.getElementById('rf-dropoff').value.trim(),
    email: document.getElementById('rf-email').value.trim(),
    phone: document.getElementById('rf-phone').value.trim(),
    status: document.getElementById('rf-status').value,
    notes: document.getElementById('rf-notes').value.trim(),
    driver: document.getElementById('rf-driver').value.trim(),
    driverPhone: document.getElementById('rf-driverPhone').value.trim()
  };
  if(!data.reservations) data.reservations = [];
  if(resId) {
    for(var i=0;i<data.reservations.length;i++){
      if(data.reservations[i].id===resId){
        obj.id = resId;
        data.reservations[i] = obj;
        break;
      }
    }
  } else {
    obj.id = genId();
    data.reservations.push(obj);
  }
  saveData();
  sbUpsertReservation(obj);
  closeModal();
  renderMain();
}

function deleteRes(resId) {
  showConfirm(t('confirmDel'), function(){
    var res = data.reservations || [];
    data.reservations = res.filter(function(r){return r.id!==resId;});
    saveData();
    sbDeleteReservation(resId);
    closeModal();
    renderMain();
  });
}

function checkDriverConflict() {
  var warn = document.getElementById('driverConflictWarn');
  if(!warn) return;
  var driverName = document.getElementById('rf-driver').value.trim();
  var date = document.getElementById('rf-date').value;
  var form = document.getElementById('rf-driver').closest('form');
  var resId = form ? form.getAttribute('onsubmit') : '';
  var match = resId.match(/saveRes\(event,'([^']*)'\)/);
  var excludeId = match ? match[1] : '';
  if(!driverName || !date) { warn.style.display='none'; return; }
  var conflict = getDriverConflict(driverName, date, excludeId);
  if(conflict) {
    warn.style.display = 'block';
    warn.textContent = t('driverConflict') + ': ' + (conflict.guest||'') + ' (' + (conflict.tour||'') + ')';
  } else {
    warn.style.display = 'none';
  }
}

function getResCommission() {
  var otaId = document.getElementById('rf-ota') ? document.getElementById('rf-ota').value : '';
  var tour = document.getElementById('rf-tour') ? document.getElementById('rf-tour').value.trim() : '';
  var vehicle = document.getElementById('rf-vehicle') ? document.getElementById('rf-vehicle').value.trim() : '';
  var result = matchProductPrice(otaId, tour, vehicle);
  if(result) return result.commission;
  var o = getOta(otaId);
  return o ? o.commission : 20;
}

function getResGross(r) {
  if(!r) return '';
  var calc = matchProductPrice(r.otaId, r.tour, r.vehicle);
  if(calc) return calc.gross;
  return r.price || '';
}

function onGrossInput() {
  var grossEl = document.getElementById('rf-gross');
  var netEl = document.getElementById('rf-price');
  if(!grossEl || !netEl) return;
  var gross = parseInt(grossEl.value) || 0;
  var comm = getResCommission();
  var net = Math.round(gross * (100 - comm) / 100);
  netEl.value = net;
  var info = document.getElementById('priceCalcInfo');
  if(info) {
    info.style.display = 'block';
    info.innerHTML = t('grossPrice') + ': ' + fmtYen(gross)
      + ' - ' + t('commission') + ' ' + comm + '%'
      + ' = <strong style="color:var(--accent)">' + t('netPrice') + ': ' + fmtYen(net) + '</strong>';
  }
}

function autoCalcPrice() {
  var otaId = document.getElementById('rf-ota') ? document.getElementById('rf-ota').value : '';
  var tour = document.getElementById('rf-tour') ? document.getElementById('rf-tour').value.trim() : '';
  var vehicle = document.getElementById('rf-vehicle') ? document.getElementById('rf-vehicle').value.trim() : '';
  var info = document.getElementById('priceCalcInfo');
  var priceInput = document.getElementById('rf-price');
  var grossInput = document.getElementById('rf-gross');
  if(!tour) { if(info) info.style.display='none'; return; }
  var result = matchProductPrice(otaId, tour, vehicle);
  if(result) {
    if(grossInput) grossInput.value = result.gross;
    if(priceInput) priceInput.value = result.net;
    if(info) {
      info.style.display = 'block';
      info.innerHTML = '<span style="color:var(--accent);font-weight:600">' + t('autoCalc') + '</span> '
        + escHtml(result.productName) + ' / ' + escHtml(result.optionName)
        + ' — ' + t('grossPrice') + ': ' + fmtYen(result.gross)
        + ' - ' + t('commission') + ' ' + result.commission + '%'
        + ' = <strong>' + t('netPrice') + ': ' + fmtYen(result.net) + '</strong>';
    }
  } else {
    if(info) info.style.display = 'none';
  }
}

function populateTours(selectedVal) {
  var sel = document.getElementById('rf-tour');
  if(!sel) return;
  var otaId = document.getElementById('rf-ota') ? document.getElementById('rf-ota').value : '';
  var ota = getOta(otaId);
  var prods = ota ? (ota.products || []) : [];
  var html = '<option value="">' + t('tour') + '...</option>';
  prods.forEach(function(p){
    if(p.status === 'unpublished') return;
    var selected = (selectedVal && (selectedVal === p.name || p.name.toLowerCase().indexOf(selectedVal.toLowerCase()) >= 0 || selectedVal.toLowerCase().indexOf(p.name.toLowerCase()) >= 0)) ? ' selected' : '';
    html += '<option value="' + escHtml(p.name) + '"' + selected + '>' + escHtml(p.name) + '</option>';
  });
  if(selectedVal && sel.querySelector('option[selected]') === null) {
    html += '<option value="' + escHtml(selectedVal) + '" selected>' + escHtml(selectedVal) + '</option>';
  }
  sel.innerHTML = html;
}

function populateVehicles(tourName, selectedVal) {
  var sel = document.getElementById('rf-vehicle');
  if(!sel) return;
  var otaId = document.getElementById('rf-ota') ? document.getElementById('rf-ota').value : '';
  var ota = getOta(otaId);
  var prods = ota ? (ota.products || []) : [];
  var options = [];
  var tn = (tourName || '').toLowerCase();
  prods.forEach(function(p){
    var pn = (p.name || '').toLowerCase();
    if(tn && (tn === pn || tn.indexOf(pn) >= 0 || pn.indexOf(tn) >= 0)) {
      options = p.options || [];
    }
  });
  var html = '<option value="">' + t('vehicle') + '...</option>';
  options.forEach(function(op){
    var sv = (selectedVal || '').toLowerCase();
    var on = (op.name || '').toLowerCase();
    var selected = (sv && (sv === on || sv.indexOf(on) >= 0 || on.indexOf(sv) >= 0)) ? ' selected' : '';
    html += '<option value="' + escHtml(op.name) + '"' + selected + '>' + escHtml(op.name) + ' (' + fmtYen(op.price) + ')</option>';
  });
  if(selectedVal && options.length === 0) {
    html += '<option value="' + escHtml(selectedVal) + '" selected>' + escHtml(selectedVal) + '</option>';
  }
  sel.innerHTML = html;
}

/* ===== CSV EXPORT ===== */
function exportCsv() {
  var res = getFilteredRes();
  var headers = [t('ota'),t('bookingNo'),t('guest'),t('tour'),t('date'),t('vehicle'),t('priceField'),t('pax'),t('status'),t('pickup'),t('dropoff'),t('email'),t('phone'),t('notes')];
  var csvRows = [headers.join(',')];
  res.forEach(function(r){
    var row = [
      '"'+getOtaName(r.otaId)+'"',
      '"'+(r.bookingNo||'')+'"',
      '"'+(r.guest||'')+'"',
      '"'+(r.tour||'')+'"',
      r.date||'',
      '"'+(r.vehicle||'')+'"',
      r.price||0,
      r.pax||0,
      '"'+getStatusText(r.status)+'"',
      '"'+(r.pickup||'')+'"',
      '"'+(r.dropoff||'')+'"',
      '"'+(r.email||'')+'"',
      '"'+(r.phone||'')+'"',
      '"'+(r.notes||'').replace(/"/g,'""')+'"'
    ];
    csvRows.push(row.join(','));
  });
  var csvContent = '﻿' + csvRows.join('\n');
  var blob = new Blob([csvContent], {type:'text/csv;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'reservations_' + todayStr() + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ===== STATISTICS TAB ===== */
function renderStatsTab() {
  var allRes = data.reservations || [];
  var otas = data.otas || [];

  var monthSet = {};
  allRes.forEach(function(r){ if(r.date && r.date.length>=7) monthSet[r.date.substring(0,7)] = true; });
  var monthKeys = Object.keys(monthSet).sort();

  var reservations = statsMonth ? allRes.filter(function(r){ return (r.date||'').substring(0,7) === statsMonth; }) : allRes;

  var totalRes = reservations.length;
  var totalNet = 0;
  var totalGross = 0;
  var totalPax = 0;
  reservations.forEach(function(r){
    var net = r.price || 0;
    totalNet += net;
    totalPax += (r.pax||0);
    var calc = matchProductPrice(r.otaId, r.tour, r.vehicle);
    if(calc) {
      totalGross += calc.gross;
    } else {
      totalGross += net;
    }
  });
  var totalComm = totalGross - totalNet;

  var h = '<div class="fade-in">';
  h += '<div class="toolbar" style="margin-bottom:20px">';
  h += '<span style="font-size:13px;color:var(--text2);font-weight:600">' + t('monthFilter') + '</span>';
  h += '<select class="lang-select" onchange="setStatsMonth(this.value)">';
  h += '<option value="">' + t('allMonths') + '</option>';
  monthKeys.forEach(function(m){
    h += '<option value="' + m + '"' + (statsMonth===m?' selected':'') + '>' + m + '</option>';
  });
  h += '</select>';
  h += '</div>';
  h += '<div class="summary-cards">';
  h += summaryCard('', t('totalReservations'), totalRes);
  h += summaryCard('', t('grossPrice'), fmtYen(totalGross));
  var netCard = '<div class="summary-card">';
  netCard += '<div class="value">' + fmtYen(totalNet) + '</div>';
  netCard += '<div class="label">' + t('netRevenue') + '</div>';
  netCard += '<div class="sub">' + t('commissionAmt') + ': ' + fmtYen(totalComm) + '</div>';
  netCard += '</div>';
  h += netCard;
  h += summaryCard('', t('totalGuests'), totalPax);
  h += '</div>';

  h += '<div class="stats-grid">';
  h += chartCard('chartResByOta', t('chartResByOta'), 'doughnut');
  h += chartCard('chartRevByOta', t('chartRevByOta'), '');
  h += chartCard('chartByStatus', t('chartByStatus'), '');
  h += chartCard('chartRevByTour', t('chartRevByTour'), '');
  h += chartCard('chartResByTour', t('chartResByTour'), '');
  h += chartCard('chartMonthly', t('chartMonthly'), '');
  h += '</div></div>';

  document.getElementById('mainArea').innerHTML = h;
  setTimeout(function(){ renderCharts(); }, 50);
}

function setStatsMonth(m) {
  statsMonth = m;
  renderStatsTab();
}

function chartCard(canvasId, title, extraClass) {
  var cls = extraClass === 'doughnut' ? 'chart-wrap doughnut' : 'chart-wrap';
  var h = '<div class="chart-card">';
  h += '<h3>' + title + '</h3>';
  h += '<div class="' + cls + '"><canvas id="' + canvasId + '"></canvas></div>';
  h += '</div>';
  return h;
}

/* ===== CHARTS ===== */
function destroyCharts() {
  chartInstances.forEach(function(c){ if(c) c.destroy(); });
  chartInstances = [];
}

function renderCharts() {
  destroyCharts();
  var allReservations = data.reservations || [];
  var reservations = statsMonth ? allReservations.filter(function(r){ return (r.date||'').substring(0,7) === statsMonth; }) : allReservations;
  var otas = data.otas || [];

  var otaResCount = {};
  var otaRevSum = {};
  var statusCount = {confirmed:0,pending:0,cancelled:0,completed:0};
  var tourRevSum = {};
  var tourResCount = {};
  var monthlyRev = {};

  reservations.forEach(function(r){
    var oid = r.otaId || 'unknown';
    otaResCount[oid] = (otaResCount[oid]||0) + 1;
    otaRevSum[oid] = (otaRevSum[oid]||0) + (r.price||0);
    if(r.status && statusCount.hasOwnProperty(r.status)) statusCount[r.status]++;
    var tour = r.tour || 'Other';
    tourRevSum[tour] = (tourRevSum[tour]||0) + (r.price||0);
    tourResCount[tour] = (tourResCount[tour]||0) + 1;
  });
  allReservations.forEach(function(r){
    if(r.date){
      var ym = r.date.substring(0,7);
      monthlyRev[ym] = (monthlyRev[ym]||0) + (r.price||0);
    }
  });

  var otaLabels = [];
  var otaColors = [];
  var otaResData = [];
  var otaRevData = [];
  otas.forEach(function(o){
    otaLabels.push(o.name);
    otaColors.push(o.color);
    otaResData.push(otaResCount[o.id]||0);
    otaRevData.push(otaRevSum[o.id]||0);
  });

  createChart('chartResByOta', 'doughnut', {
    labels: otaLabels,
    datasets: [{data:otaResData, backgroundColor:otaColors, borderWidth:2, borderColor:'#fff'}]
  }, {responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom'}}});

  createChart('chartRevByOta', 'bar', {
    labels: otaLabels,
    datasets: [{label:t('totalRevenue'), data:otaRevData, backgroundColor:otaColors}]
  }, {responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
    scales:{y:{ticks:{callback:function(v){return '¥'+v.toLocaleString();}}}}});

  var statusLabels = [t('confirmed'),t('pending'),t('cancelled'),t('completed')];
  var statusData = [statusCount.confirmed,statusCount.pending,statusCount.cancelled,statusCount.completed];
  var statusColors = ['#2D9B4E','#E8A838','#D94848','#888'];
  createChart('chartByStatus', 'bar', {
    labels: statusLabels,
    datasets: [{label:t('status'), data:statusData, backgroundColor:statusColors}]
  }, {responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}});

  var tourNames = Object.keys(tourRevSum);
  var tourRevArr = tourNames.map(function(t){return tourRevSum[t];});
  createChart('chartRevByTour', 'bar', {
    labels: tourNames,
    datasets: [{label:t('totalRevenue'), data:tourRevArr, backgroundColor:'#C45D3E'}]
  }, {responsive:true, maintainAspectRatio:false, indexAxis:'y', plugins:{legend:{display:false}},
    scales:{x:{ticks:{callback:function(v){return '¥'+v.toLocaleString();}}}}});

  var tourResArr = tourNames.map(function(t){return tourResCount[t];});
  createChart('chartResByTour', 'bar', {
    labels: tourNames,
    datasets: [{label:t('reservations'), data:tourResArr, backgroundColor:'#4A90D9'}]
  }, {responsive:true, maintainAspectRatio:false, indexAxis:'y', plugins:{legend:{display:false}}});

  var monthKeys = Object.keys(monthlyRev).sort();
  var monthData = monthKeys.map(function(k){return monthlyRev[k];});
  createChart('chartMonthly', 'line', {
    labels: monthKeys,
    datasets: [{label:t('totalRevenue'), data:monthData, borderColor:'#C45D3E', backgroundColor:'rgba(196,93,62,0.1)', fill:true, tension:0.3}]
  }, {responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
    scales:{y:{ticks:{callback:function(v){return '¥'+v.toLocaleString();}}}}});
}

function createChart(canvasId, type, chartData, chartOptions) {
  var el = document.getElementById(canvasId);
  if(!el) return;
  var ctx = el.getContext('2d');
  var c = new Chart(ctx, {type:type, data:chartData, options:chartOptions});
  chartInstances.push(c);
}

/* fetch all data from Supabase */
function fetchAll(onDone) {
  var resUrl = SUPABASE_URL + '/rest/v1/reservations?select=*';
  var otaUrl = SUPABASE_URL + '/rest/v1/otas?select=*';
  Promise.all([
    fetch(resUrl, {headers: sbHeaders()}).then(function(r){ return r.json(); }),
    fetch(otaUrl, {headers: sbHeaders()}).then(function(r){ return r.json(); })
  ]).then(function(results){
    var resRows = results[0] || [];
    var otaRows = results[1] || [];
    if(otaRows.length > 0) {
      data.otas = otaRows.map(rowToOta);
    }
    data.reservations = resRows.map(rowToRes);
    if(!data.otas) data.otas = [];
    if(!data.reservations) data.reservations = [];
    data.reservations.forEach(function(r){
      if(!r.price || r.price === 0) {
        var calc = matchProductPrice(r.otaId, r.tour, r.vehicle);
        if(calc) {
          r.price = calc.net;
          sbUpsertReservation(r);
        }
      }
    });
    localStorage.setItem('jb-ota-data', JSON.stringify(data));
    syncConnected = true;
    if(onDone) onDone(true);
  }).catch(function(err){
    syncConnected = false;
    renderHeader();
    if(onDone) onDone(false, err);
  });
}

/* upsert a single reservation */
function sbUpsertReservation(r) {
  var url = SUPABASE_URL + '/rest/v1/reservations?on_conflict=id';
  return fetch(url, {
    method: 'POST',
    headers: sbHeaders({'Prefer': 'resolution=merge-duplicates'}),
    body: JSON.stringify(resToRow(r))
  });
}

/* delete a single reservation */
function sbDeleteReservation(id) {
  var url = SUPABASE_URL + '/rest/v1/reservations?id=eq.' + encodeURIComponent(id);
  return fetch(url, {method: 'DELETE', headers: sbHeaders()});
}

/* upsert a single OTA */
function sbUpsertOta(o) {
  var url = SUPABASE_URL + '/rest/v1/otas?on_conflict=id';
  return fetch(url, {
    method: 'POST',
    headers: sbHeaders({'Prefer': 'resolution=merge-duplicates'}),
    body: JSON.stringify(otaToRow(o))
  });
}

/* delete a single OTA */
function sbDeleteOta(id) {
  var url = SUPABASE_URL + '/rest/v1/otas?id=eq.' + encodeURIComponent(id);
  return fetch(url, {method: 'DELETE', headers: sbHeaders()});
}

/* manual sync button */
function doSync() {
  syncConnected = false;
  renderHeader();
  fetchAll(function(ok, err){
    if(ok) { renderAll(); }
    else { showPopup('Sync failed: ' + (err ? err.message : '')); }
  });
}

function showSyncSettings() {
  var h = '';
  h += '<div class="modal-header"><h2>' + t('syncSettings') + '</h2>';
  h += '<button class="modal-close" onclick="closeModal()">&times;</button></div>';
  h += '<div class="modal-body">';
  h += '<div style="font-size:13px;color:var(--text2);margin-bottom:16px">Supabase connected.</div>';
  h += '<div style="font-size:12px;color:var(--text2);word-break:break-all;margin-bottom:20px">' + escHtml(SUPABASE_URL) + '</div>';
  h += '<button class="btn btn-accent btn-sm" onclick="doSync();closeModal()">' + t('sync') + '</button>';
  h += '</div>';
  showModal(h, false);
}

function startPolling() {
  stopPolling();
  syncInterval = setInterval(function(){
    if(localDirty) return;
    var oldHash = JSON.stringify(data.reservations || []) + JSON.stringify(data.otas || []);
    fetchAll(function(ok){
      if(!ok) { renderHeader(); return; }
      var newHash = JSON.stringify(data.reservations || []) + JSON.stringify(data.otas || []);
      if(newHash !== oldHash) renderAll();
      else renderHeader();
    });
  }, 15000);
}

function stopPolling() {
  if(syncInterval) { clearInterval(syncInterval); syncInterval = null; }
}

/* import JSON manually (one-time migration helper) */
function importJson() {
  var raw = document.getElementById('sync-json') ? document.getElementById('sync-json').value.trim() : '';
  if(!raw) { showPopup('No data'); return; }
  try {
    var imported = JSON.parse(raw);
    var otasList = imported.otas || [];
    var resList = imported.reservations || [];
    otasList.forEach(function(o){ sbUpsertOta(o); });
    resList.forEach(function(r){
      if(!r.id) r.id = genId();
      if(r.resNo && !r.bookingNo) r.bookingNo = r.resNo;
      if(r.memo !== undefined && r.notes === undefined) r.notes = r.memo;
      if(r.ota && !r.otaId) {
        var nm = {};
        otasList.forEach(function(o){ nm[o.name.toLowerCase()] = o.id; });
        if(nm[(r.ota+'').toLowerCase()]) r.otaId = nm[(r.ota+'').toLowerCase()];
      }
      sbUpsertReservation(r);
    });
    closeModal();
    showPopup('Import sent: ' + resList.length + ' reservations');
    setTimeout(doSync, 2000);
  } catch(e) {
    showPopup('Error: ' + e.message);
  }
}
